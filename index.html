<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chartink Develop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div>
    <div class="header">
      <div class="fileSelector">
        <input type="file" name="file" id="file" accept=".csv" onchange="readCSVFile()"/>
        <input type="button" id="btnsubmit" value="Submit" onclick="readCSVFile();" />
      </div>
      <div class="fileName" style='margin-left: 100px'></div>
  
      <div id="filterBtnGroup" class="btn-group border ms-1">
        <button type="button" value="65" class="btn btn-default border py-0 filter-btn">A-I</button>
        <button type="button" value="74" class="btn btn-default border py-0 filter-btn">J-R</button>
        <button type="button" value="83" class="btn btn-default border py-0 filter-btn">S-Z</button>
      </div>
    </div>
    <div class="d-flex counter-container">
      <span class="rowCounter border pe-1"></span>
      <span class="cellCounter border pe1"></span>
      <span class="tdCounter border"></span>
    </div>
    
    <br />
    <!-- List CSV file data -->
    <table id="tblcsvdata" border="1" style="border-collapse: collapse">
      <tbody onclick="highlightShare(event)"></tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

  <script src="script.js"></script>
</body>

</html>
